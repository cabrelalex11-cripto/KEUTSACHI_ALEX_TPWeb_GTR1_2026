<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width,initial-scale=1.0">
    <title>Contact - Mon mini-site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
    <header>
    <h1>Page de contact</h1>
    </header>
    <nav>
         <a href="index.html">Acceuil</a>
        <a href="presentation.html">Présentation</a>
        <a href="contact.html">contact</a>
    </nav>
    
    <h2>Formulaire de contact</h2>
    <p>Veillez remplir ce formulaire pour envoyer un Message.</p>
    <form >
        
        <label for="Nom">Nom :</label>
        <input type="text" id="Nom" name="Nom" placeholder="Entrer votre nom" required >
        <br>
        <br>
        <label for="Prenom">Prenom :</label>
        <input type="text" id="Prenom" name="Prenom" placeholder="Entrer votre prenom" required >
        <br>
        <br>
        <label for="email">Adresse email:</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
        <br>
        <br>
        
        <label for="telephone">Telephone :</label>
        <input type="tel" id="telephone" name="telephone" placeholder="+237 6XXXXXXXX">
        <br>
        <br>
        <div class="section">
        <label for="domaine">Domaine d'interet :</label>
        <select name="domaine" id="domaine" required>
        <option value="">-- Choisir un domaine --</option>
        <option value="reseaux">Reseaux informatiques</option>
        <option value="cybersecurite">Cybersecurite</option>
        <option value="developpement-web">Developpement web</option>
        <option value="administration-systeme">Administration systeme</option>
        </div>
    </select>
    <br>
    <br>

        <label for="motif du message" >Motif du message :</label>
        <select name="motif" id="motif" required>
            <option value="">-- Choisir un motif --</option>
            <option value="information">Demande d'information</option>
            <option value="stage">Demande de stage</option>
            <option value="projet">Proposition de Project</option>
            <option value="autre">Autre demande</option>
        </select>
        <br>
        <br>
        
        <p>Statut du visiteur :</p>
        <input type="radio" id="etudiant" name="statut" value="etudiant" required>
        <label for="etudiant">Etudiant</label>
        <br>
        <input type="radio"   id="enseignant" name="statut" value="enseignant">
        <label for="enseignant" >Enseignant</label>
        <br>
        <input type="radio" id="professionnel" name="statut" value="professionnel">
        <label for="professionnel">Professionnel</label>
        <br>
        <br> 
        
        <label for="message">Message :</label>
        <br>
        <textarea name="message" id="message" rows="5" cols="40" placeholder="Ecriver votre message ici" required ></textarea>
        <br>
        <br>
       
        <input type="checkbox" id="confirmation" name="confirmation" required>
        <label for="confirmation">Je confirme que les informations saisies sont correctes.</label>
        <br>
        <br>
    
        <button type="submit">Envoyer</button>
        <button type="reset">Effacer</button>

    </form>
    
</body>
<footer>
     <p>&copy; 2026 - Mon mini-site </p>

    </footer>

</div>
</html>
